version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: reservafacil_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/setup_database.sql:/docker-entrypoint-initdb.d/setup_database.sql
    ports:
      - "5633:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservafacil_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reservafacil_backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - TIMEZONE=${TIMEZONE}
      - ENVIRONMENT=${ENVIRONMENT}
      - CORS_ORIGINS=${APP_URL}
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - reservafacil_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${APP_URL}/api/v1
    container_name: reservafacil_frontend
    environment:
      - NEXT_PUBLIC_API_URL=${APP_URL}/api/v1
      - NODE_ENV=${NODE_ENV}
      - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED}
    ports:
      - "3011:3000"
    depends_on:
      - backend
    networks:
      - reservafacil_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: reservafacil_nginx
    ports:
      - "8130:80"
    depends_on:
      - frontend
      - backend
    networks:
      - reservafacil_network

volumes:
  postgres_data:

networks:
  reservafacil_network:
    driver: bridge