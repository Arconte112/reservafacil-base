version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: reservafacil_postgres
    environment:
      POSTGRES_DB: reservas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/setup_database.sql:/docker-entrypoint-initdb.d/setup_database.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservafacil_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reservafacil_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/reservas_db
      - SECRET_KEY=hsadsagsada
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - TIMEZONE=America/Santo_Domingo
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - reservafacil_network
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: reservafacil_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - reservafacil_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: reservafacil_nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - reservafacil_network

volumes:
  postgres_data:

networks:
  reservafacil_network:
    driver: bridge